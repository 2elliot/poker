<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Poker Bot Tournament{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <!-- Navigation Bar -->
    <nav class="main-nav">
        <div class="nav-brand">
            <a href="/">Poker Bots</a>
        </div>
        <button class="nav-hamburger" id="navHamburger" onclick="toggleMobileNav()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="/" class="nav-link {% block nav_tournament %}{% endblock %}">Tournament</a>
            <a href="/submit" class="nav-link {% block nav_submit %}{% endblock %}">Submit Bot</a>
            <a href="/leaderboard" class="nav-link {% block nav_leaderboard %}{% endblock %}">Leaderboard</a>
            {% if is_admin %}
            <a href="/admin/review" class="nav-link {% block nav_admin %}{% endblock %}">Admin</a>
            {% endif %}
        </div>
        <div class="nav-user">
            {% if current_username %}
            <span class="nav-username">{{ current_username }}</span>
            <a href="#" class="nav-link" onclick="logout()">Logout</a>
            {% else %}
            <a href="/login" class="nav-link">Login</a>
            {% endif %}
        </div>
    </nav>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
    // Mobile nav toggle
    function toggleMobileNav() {
        document.getElementById('navLinks').classList.toggle('open');
        document.getElementById('navHamburger').classList.toggle('open');
    }

    // Logout
    async function logout() {
        await fetch('/api/user/logout', { method: 'POST' });
        window.location.reload();
    }

    // Toast notification system — replaces alert()
    function showToast(message, type = 'info', duration = 4000) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);

        // Trigger enter animation
        requestAnimationFrame(() => toast.classList.add('show'));

        setTimeout(() => {
            toast.classList.remove('show');
            toast.addEventListener('transitionend', () => toast.remove());
        }, duration);
    }

    // Confirm dialog replacement — still uses native confirm for now
    // (custom modals add complexity; confirm() is acceptable for destructive actions)
    </script>

    <!-- Page Content -->
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
