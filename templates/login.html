{% extends "base.html" %}

{% block title %}Login - Poker Bot Tournament{% endblock %}
{% block body_class %}page-login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome</h1>
            <p>Sign in to submit and manage your bots</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 14px; font-size: 16px;" id="submitBtn">
                Login
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px; color: #888; font-size: 14px;">
            <span id="toggleText">Don't have an account?</span>
            <a href="#" id="toggleLink" onclick="toggleMode(event)" style="color: #4a90e2; text-decoration: none; font-weight: 600;">Create one</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let isRegisterMode = false;

    function toggleMode(event) {
        event.preventDefault();
        isRegisterMode = !isRegisterMode;

        const btn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');
        const passwordInput = document.getElementById('password');
        const confirmGroup = document.getElementById('confirmPasswordGroup');
        const confirmInput = document.getElementById('confirmPassword');

        if (isRegisterMode) {
            btn.textContent = 'Create Account';
            toggleText.textContent = 'Already have an account?';
            toggleLink.textContent = 'Sign in';
            passwordInput.setAttribute('autocomplete', 'new-password');
            passwordInput.setAttribute('minlength', '8');
            confirmGroup.style.display = '';
            confirmInput.setAttribute('required', '');
        } else {
            btn.textContent = 'Login';
            toggleText.textContent = "Don't have an account?";
            toggleLink.textContent = 'Create one';
            passwordInput.setAttribute('autocomplete', 'current-password');
            passwordInput.removeAttribute('minlength');
            confirmGroup.style.display = 'none';
            confirmInput.removeAttribute('required');
            confirmInput.value = '';
        }

        // Clear alert
        document.getElementById('alertBox').className = 'alert';
    }

    function showAlert(message, type = 'error') {
        const alertBox = document.getElementById('alertBox');
        alertBox.className = `alert alert-${type} show`;
        alertBox.textContent = message;

        if (type !== 'error') {
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }
    }

    async function handleLogin(event) {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');

        if (isRegisterMode) {
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                document.getElementById('confirmPassword').focus();
                return;
            }
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>' + (isRegisterMode ? 'Creating...' : 'Signing in...');

        const endpoint = isRegisterMode ? '/api/user/register' : '/api/user/login';

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.success) {
                showAlert(data.message || 'Success!', 'success');
                setTimeout(() => {
                    window.location.href = '/submit';
                }, 500);
            } else {
                showAlert(data.error || 'Something went wrong', 'error');
            }
        } catch (error) {
            showAlert('Connection error. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = isRegisterMode ? 'Create Account' : 'Login';
        }
    }
</script>
{% endblock %}
