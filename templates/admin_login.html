{% extends "base.html" %}

{% block title %}Admin Login - Poker Bot Tournament{% endblock %}
{% block body_class %}page-login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-header">
            <h1>Admin Access</h1>
            <p>Bot Review Panel</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 14px; font-size: 16px;" id="loginBtn">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function showAlert(message, type = 'error') {
        const alertBox = document.getElementById('alertBox');
        alertBox.className = `alert alert-${type} show`;
        alertBox.textContent = message;

        setTimeout(() => {
            alertBox.classList.remove('show');
        }, 5000);
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('loginBtn');
        const form = document.getElementById('loginForm');

        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>Authenticating...';
            form.style.opacity = '0.6';
        } else {
            btn.disabled = false;
            btn.textContent = 'Login';
            form.style.opacity = '1';
        }
    }

    async function handleLogin(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        setLoading(true);

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.success) {
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/admin/review';
                }, 1000);
            } else {
                showAlert(data.error || 'Invalid credentials', 'error');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        } catch (error) {
            console.error('Login error:', error);
            showAlert('Connection error. Please try again.', 'error');
        } finally {
            setLoading(false);
        }
    }

    // Check if already authenticated
    async function checkAuth() {
        try {
            const response = await fetch('/api/auth/check');
            if (response.ok) {
                const data = await response.json();
                if (data.authenticated && data.is_admin) {
                    window.location.href = '/admin/review';
                }
            }
        } catch (error) {
            // Not authenticated, show login form
        }
    }

    checkAuth();
</script>
{% endblock %}
